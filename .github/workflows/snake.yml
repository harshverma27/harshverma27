name: Generate Contribution Snake

on:
  # run twice a day so the snake stays fresh
  schedule:
    - cron: "0 */12 * * *"
  # let me trigger it manually from the Actions tab
  workflow_dispatch:
  # regenerate whenever I push to main
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: snake-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs (light + dark)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-light
            dist/snake-dark.svg?palette=github-dark&color_snake=#4ade80&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
