name: Generate Profile Metrics

on:
  # refresh once a day
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Render metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # METRICS_TOKEN = a classic PAT (scopes: public_repo, read:user).
          # Falls back to the built-in token for basic metrics if the secret is unset.
          token: ${{ secrets.CONTRIB_TOKEN }}
          filename: metrics.svg
          user: harshverma27
          config_timezone: Asia/Kolkata

          # dark, neon-leaning theme to match the README
          template: terminal
          base: header, activity, community, repositories, metadata

          # languages I actually ship
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_sections: most-used

          # the isometric contribution calendar — the showpiece
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # coding habits + active hours
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # lines of code changed
          plugin_lines: yes
